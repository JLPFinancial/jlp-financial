<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLP Financial</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f0f3f8;min-height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{text-align:center;padding:40px 20px}
.badge{width:64px;height:64px;background:linear-gradient(135deg,#c9a84c,#e2c47a);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.badge svg{width:30px;height:30px}
h1{font-family:'DM Serif Display',serif;font-size:32px;color:#0f2140;margin-bottom:8px}
p{color:#64748b;font-size:15px;margin-bottom:40px}
.cards{display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
.card{background:white;border:1px solid #e2e8f0;border-radius:14px;padding:32px 36px;width:260px;box-shadow:0 4px 20px rgba(13,27,46,.08);text-decoration:none;transition:all .2s}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 32px rgba(13,27,46,.14)}
.card-icon{width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.card-title{font-size:17px;font-weight:700;color:#0f2140;margin-bottom:6px}
.card-desc{font-size:13px;color:#64748b;line-height:1.5}
</style>
</head>
<body>
<div class="wrap">
  <div class="badge">
    <svg viewBox="0 0 24 24" fill="none" stroke="#0f2140" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
  </div>
  <h1>JLP Financial</h1>
  <p>Select where you'd like to go</p>
  <div class="cards">
    <a class="card" href="jlp-application-v3.html">
      <div class="card-icon" style="background:#eff6ff">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1a56db" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      </div>
      <div class="card-title">Loan Application</div>
      <div class="card-desc">Start a new finance application for personal or business lending</div>
    </a>
    <a class="card" href="jlp-crm.html">
      <div class="card-icon" style="background:#f0fdf4">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      </div>
      <div class="card-title">CRM Dashboard</div>
      <div class="card-desc">View and manage all submitted loan applications and documents</div>
    </a>
  </div>
</div>
</body>
</html>
